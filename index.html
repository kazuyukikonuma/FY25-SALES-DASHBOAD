<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FY25 銷售額儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap');
  :root {
    --bg:#f4f6f9; --surface:#fff; --border:#d8dde8; --border-light:#edf0f5;
    --text:#111827; --text-sub:#374151;
    --al:#2563eb; --ap:#059669; --am:#7c3aed; --at:#dc2626;
    --al-bg:#eff6ff; --ap-bg:#ecfdf5; --am-bg:#f5f3ff; --at-bg:#fef2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);padding:22px 26px;font-size:15px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid var(--border);}
  .hd-left{display:flex;align-items:baseline;gap:12px;}
  h1{font-size:1.3rem;font-weight:700;}
  #data-info{font-size:.8rem;color:var(--text-sub);font-family:'DM Mono',monospace;}
  .lang-toggle{display:flex;border:2px solid var(--border);border-radius:8px;overflow:hidden;}
  .lang-btn{background:none;border:none;padding:6px 16px;font-size:.85rem;font-family:inherit;font-weight:500;cursor:pointer;color:var(--text-sub);}
  .lang-btn.active{background:var(--text);color:#fff;}
  .lang-btn:not(.active):hover{background:var(--border-light);color:var(--text);}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .kpi-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px 18px;}
  .kpi-card.ct{border-top:4px solid var(--at);}
  .kpi-card.cl{border-top:4px solid var(--al);}
  .kpi-card.cp{border-top:4px solid var(--ap);}
  .kpi-card.cm{border-top:4px solid var(--am);}
  .kpi-label{font-size:.8rem;font-weight:600;color:var(--text-sub);margin-bottom:6px;}
  .kpi-value{font-size:1.7rem;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.03em;line-height:1;margin-bottom:3px;}
  .kpi-unit{font-size:.9rem;font-weight:500;margin-left:3px;opacity:.75;}
  .kpi-card.ct .kpi-value{color:var(--at);}
  .kpi-card.cl .kpi-value{color:var(--al);}
  .kpi-card.cp .kpi-value{color:var(--ap);}
  .kpi-card.cm .kpi-value{color:var(--am);}
  .kpi-sub{font-size:.76rem;color:var(--text-sub);font-weight:500;}

  /* Period switcher */
  .period-sw{display:flex;gap:6px;margin-bottom:18px;}
  .period-btn{background:var(--surface);border:2px solid var(--border);border-radius:8px;padding:8px 22px;font-size:.9rem;font-family:inherit;font-weight:700;cursor:pointer;color:var(--text-sub);}
  .period-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
  .period-btn:not(.active):hover{border-color:var(--text-sub);color:var(--text);}
  .period-pane{display:none;} .period-pane.active{display:block;}

  /* Q/H tabs */
  .q-tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--border);align-items:flex-end;}
  .q-sep{width:1px;height:18px;background:var(--border);margin:0 4px 2px;}
  .q-tab-btn{background:none;border:none;padding:8px 18px;font-size:.87rem;font-family:inherit;font-weight:700;cursor:pointer;color:var(--text-sub);border-bottom:3px solid transparent;margin-bottom:-2px;}
  .q-tab-btn.active{color:var(--text);border-bottom-color:var(--at);}
  .q-tab-btn:not(.active):hover{color:var(--text);}
  .q-tab-pane{display:none;} .q-tab-pane.active{display:block;}

  /* Main tabs */
  .main-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:2px solid var(--border);}
  .main-tab-btn{background:none;border:none;padding:9px 20px;font-size:.88rem;font-family:inherit;font-weight:700;cursor:pointer;color:var(--text-sub);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
  .main-tab-btn.active{color:var(--text);}
  .main-tab-btn.active.tt{border-bottom-color:var(--at);}
  .main-tab-btn.active.tl{border-bottom-color:var(--al);}
  .main-tab-btn.active.tp{border-bottom-color:var(--ap);}
  .main-tab-btn.active.tm{border-bottom-color:var(--am);}
  .main-tab-btn.active.tc{border-bottom-color:#374151;}
  .main-tab-btn:not(.active):hover{color:var(--text);}
  .main-tab-pane{display:none;} .main-tab-pane.active{display:block;}

  /* Cards */
  .card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;}
  .card-title{font-size:.86rem;font-weight:700;color:var(--text);margin-bottom:14px;}
  .chart-wrap{position:relative;height:270px;}
  .cd-grid{display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:12px;}

  /* Channel side menu */
  .ch-layout{display:grid;grid-template-columns:170px 1fr;gap:12px;align-items:start;}
  .ch-side{background:var(--surface);border:2px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:12px;}
  .ch-side-title{font-size:.7rem;font-weight:700;color:var(--text-sub);letter-spacing:.08em;padding:10px 12px 7px;border-bottom:1px solid var(--border-light);text-transform:uppercase;}
  .ch-menu-btn{display:block;width:100%;background:none;border:none;border-bottom:1px solid var(--border-light);padding:9px 12px;text-align:left;font-size:.84rem;font-family:inherit;font-weight:500;color:var(--text-sub);cursor:pointer;}
  .ch-menu-btn:last-child{border-bottom:none;}
  .ch-menu-btn:not(.active):hover{background:var(--bg);color:var(--text);}
  .ch-menu-btn.active{background:var(--text);color:#fff;font-weight:700;}
  .ch-content{min-width:0;}
  .sub-pane{display:none;} .sub-pane.active{display:block;}

  /* Table */
  .tw{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.83rem;}
  th{text-align:right;color:var(--text);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--border);font-family:'DM Mono',monospace;font-size:.76rem;white-space:nowrap;background:var(--bg);}
  th:first-child{text-align:left;}
  td{text-align:right;padding:7px 10px;border-bottom:1px solid var(--border-light);font-family:'DM Mono',monospace;font-size:.83rem;color:var(--text);white-space:nowrap;}
  td:first-child{text-align:left;font-family:'Noto Sans JP','Noto Sans TC',sans-serif;font-size:.86rem;font-weight:500;}
  tr:last-child td{border-bottom:none;}
  tr:hover:not(.tr) td{background:var(--bg);}
  .tr td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;}
  .tr.ct td{color:var(--at);background:var(--at-bg);}
  .tr.cl td{color:var(--al);background:var(--al-bg);}
  .tr.cp td{color:var(--ap);background:var(--ap-bg);}
  .tr.cm td{color:var(--am);background:var(--am-bg);}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.76rem;font-weight:600;}
  .bl{background:var(--al-bg);color:var(--al);}
  .bp{background:var(--ap-bg);color:var(--ap);}
  .bm{background:var(--am-bg);color:var(--am);}

  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-sub);gap:10px;}
  .spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--at);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error{color:var(--at);text-align:center;padding:40px;}
  @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.cd-grid{grid-template-columns:1fr;}.ch-layout{grid-template-columns:1fr;}body{padding:12px;}}
</style>
</head>
<body>
<header>
  <div class="hd-left">
    <h1 id="h-title">FY25 銷售額儀表板</h1>
    <span id="data-info">載入中…</span>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn active" onclick="setLang('zh')">繁體中文</button>
  </div>
</header>
<div id="app"><div class="loading"><div class="spinner"></div><span>載入資料中…</span></div></div>

<script>
const MONTHS = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
const CATS = ['學習','周邊','Mirafeel'];
const CAT_COLORS = {'學習':'#2563eb','周邊':'#059669','Mirafeel':'#7c3aed'};
const CAT_CLASS  = {'學習':'cl','周邊':'cp','Mirafeel':'cm'};
const BADGE_CLS  = {'學習':'bl','周邊':'bp','Mirafeel':'bm'};
const TOT_CLS    = {'學習':'cl','周邊':'cp','Mirafeel':'cm'};
const CH_COLORS  = ['#2563eb','#059669','#7c3aed','#d97706','#dc2626','#0891b2','#be185d'];

const QUARTERS = [
  {key:'Q1',months:['4月','5月','6月']},
  {key:'Q2',months:['7月','8月','9月']},
  {key:'Q3',months:['10月','11月','12月']},
  {key:'Q4',months:['1月','2月','3月']},
];
const HALVES = [
  {key:'H1',months:['4月','5月','6月','7月','8月','9月']},
  {key:'H2',months:['10月','11月','12月','1月','2月','3月']},
];

const I18N = {
  ja:{title:'FY25 売上額ダッシュボード',annual:'年間合計（税抜）',total:'合計',wan:'万元',
      cat:'カテゴリ',ch:'チャネル',trend:'月次推移',donut:'カテゴリ構成比',
      tbl:'月別明細',chMonthly:'チャネル×月次',tabCh:'チャネル別',chList:'通路一覧',
      periodY:'年度',periodQ:'四半期別',periodH:'上/下半期',
      H1:'上半期',H2:'下半期',
      catNames:{'學習':'学習','周邊':'周邊','Mirafeel':'Mirafeel'}},
  zh:{title:'FY25 銷售額儀表板',annual:'年度合計（未稅）',total:'合計',wan:'萬元',
      cat:'品類',ch:'通路',trend:'月次趨勢',donut:'品類構成比',
      tbl:'月別明細',chMonthly:'通路×月次',tabCh:'通路別',chList:'通路列表',
      periodY:'年度',periodQ:'季別',periodH:'上/下半年',
      H1:'上半年',H2:'下半年',
      catNames:{'學習':'學習','周邊':'周邊','Mirafeel':'Mirafeel'}},
};

let lang='zh', charts={}, globalRows=null;
const t = k => I18N[lang][k];
const cn = c => I18N[lang].catNames[c]||c;
const fw = n => (n/10000).toFixed(1);

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(l==='ja'?'日本語':'繁體')));
  if(globalRows) renderApp(globalRows);
}

function parseCSV(text){
  const lines=text.trim().split('\n'), hdr=lines[0].split(',');
  return lines.slice(1).map(line=>{
    const v=line.split(','), o={};
    hdr.forEach((h,i)=>{const s=v[i]?.trim(); o[h.trim()]=(s!==''&&!isNaN(s))?Number(s):(s||'');});
    return o;
  });
}

function aggByCat(rows){
  const r={};
  rows.forEach(row=>{
    const c=row.category;
    if(!r[c]) r[c]={months:Object.fromEntries(MONTHS.map(m=>[m,0]))};
    MONTHS.forEach(m=>{r[c].months[m]+=row[m]||0;});
  });
  return r;
}

function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
const gridC='#edf0f5', tickS={color:'#111827',font:{size:12,weight:'600'}};

function makeBar(id,labels,datasets,unit){
  destroyChart(id);
  const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#111827',font:{size:12,weight:'600'}}}},
    scales:{
      x:{stacked:true,ticks:tickS,grid:{color:gridC}},
      y:{stacked:true,ticks:{...tickS,callback:v=>v+unit},grid:{color:gridC}}
    }
  }});
}

function makeDonut(id,labels,data,colors){
  destroyChart(id);
  const el=document.getElementById(id); if(!el) return;
  const total=data.reduce((a,b)=>a+b,0);
  charts[id]=new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},options:{
    responsive:true,maintainAspectRatio:false,cutout:'58%',
    plugins:{
      legend:{position:'bottom',labels:{color:'#111827',font:{size:12,weight:'600'},padding:12}},
      tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fw(ctx.parsed*10000)} (${((ctx.parsed/total)*100).toFixed(1)}%)`}}
    },
    animation:{onComplete(){drawPct(this);}}
  }});
}

function drawPct(chart){
  const ctx=chart.ctx, meta=chart.getDatasetMeta(0);
  const total=chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
  ctx.save(); ctx.font='700 11px DM Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  meta.data.forEach((arc,i)=>{
    const pct=((chart.data.datasets[0].data[i]/total)*100).toFixed(1)+'%';
    const angle=(arc.startAngle+arc.endAngle)/2, r=(arc.innerRadius+arc.outerRadius)/2;
    ctx.fillStyle='#fff';
    ctx.fillText(pct,arc.x+Math.cos(angle)*r,arc.y+Math.sin(angle)*r);
  });
  ctx.restore();
}

// ---- HTML builder (純粋な文字列連結) ----
function buildPaneHTML(mList, sfx, byCat, chData, sortedCh) {
  const getV = (cat, m) => byCat[cat] ? (byCat[cat].months[m]||0) : 0;
  const getCV = (ch, cat, m) => chData[ch][cat][m]||0;

  const catTots={}, mTots={};
  CATS.forEach(cat=>{ catTots[cat]=mList.reduce((s,m)=>s+getV(cat,m),0); });
  const grand=Object.values(catTots).reduce((a,b)=>a+b,0);
  mList.forEach(m=>{ mTots[m]=CATS.reduce((s,cat)=>s+getV(cat,m),0); });

  // チャネル合計順
  const chTot = ch => mList.reduce((s,m)=>s+CATS.reduce((ss,cat)=>ss+getCV(ch,cat,m),0),0);
  const sCh = [...sortedCh].sort((a,b)=>chTot(b)-chTot(a));
  const chGrandByM = m => sCh.reduce((s,ch)=>s+CATS.reduce((ss,cat)=>ss+getCV(ch,cat,m),0),0);

  // 月ラベル行
  const mThs = mList.map(m=>'<th>'+m+'</th>').join('');

  // カテゴリテーブル行
  const catRows = CATS.map(cat=>{
    if(!byCat[cat]) return '';
    const cells = mList.map(m=>'<td>'+fw(getV(cat,m))+'</td>').join('');
    return '<tr><td><span class="badge '+BADGE_CLS[cat]+'">'+cn(cat)+'</span></td>'+cells+'<td><strong>'+fw(catTots[cat])+'</strong></td></tr>';
  }).join('');
  const totRow = '<tr class="tr ct"><td>'+t('total')+'</td>'+mList.map(m=>'<td>'+fw(mTots[m])+'</td>').join('')+'<td>'+fw(grand)+'</td></tr>';

  // カテゴリ別パネル
  const catPanes = CATS.map(cat=>{
    if(!byCat[cat]) return '';
    const chRowsForCat = sCh.map((ch,i)=>{
      const vals = mList.map(m=>getCV(ch,cat,m));
      const tot = vals.reduce((a,b)=>a+b,0);
      if(!tot) return '';
      return '<tr><td>'+ch+'</td>'+vals.map(v=>'<td>'+fw(v)+'</td>').join('')+'<td><strong>'+fw(tot)+'</strong></td></tr>';
    }).join('');
    const colTots = mList.map(m=>sCh.reduce((s,ch)=>s+getCV(ch,cat,m),0));
    const catTot = colTots.reduce((a,b)=>a+b,0);
    return '<div id="pane-'+cat+'-'+sfx+'" class="main-tab-pane">'
      +'<div class="card"><div class="card-title">'+cn(cat)+' — '+t('trend')+'（'+t('wan')+'）</div>'
      +'<div class="chart-wrap"><canvas id="chart-cat-'+cat+'-'+sfx+'"></canvas></div></div>'
      +'<div class="card"><div class="card-title">'+cn(cat)+' — '+t('ch')+'×'+t('trend')+'</div>'
      +'<div class="tw"><table><thead><tr><th>'+t('ch')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead><tbody>'
      +chRowsForCat
      +'<tr class="tr '+TOT_CLS[cat]+'"><td>'+t('total')+'</td>'+colTots.map(v=>'<td>'+fw(v)+'</td>').join('')+'<td>'+fw(catTot)+'</td></tr>'
      +'</tbody></table></div></div></div>';
  }).join('');

  // チャネル別サイドメニューパネル
  const sideMenuBtns = '<button class="ch-menu-btn active" onclick="switchChMenu(this,\'sub-all-'+sfx+'\')">'+t('total')+'</button>'
    + sCh.map((ch,i)=>'<button class="ch-menu-btn" onclick="switchChMenu(this,\'sub-'+i+'-'+sfx+'\')">'+ch+'</button>').join('');

  const allChRows = sCh.map(ch=>{
    const mv=mList.map(m=>CATS.reduce((s,cat)=>s+getCV(ch,cat,m),0));
    return '<tr><td>'+ch+'</td>'+mv.map(v=>'<td>'+fw(v)+'</td>').join('')+'<td><strong>'+fw(mv.reduce((a,b)=>a+b,0))+'</strong></td></tr>';
  }).join('');

  const allChPane = '<div id="sub-all-'+sfx+'" class="sub-pane active">'
    +'<div class="card"><div class="card-title">'+t('tabCh')+' — '+t('trend')+'（'+t('wan')+'）</div>'
    +'<div class="chart-wrap"><canvas id="chart-ch-all-'+sfx+'"></canvas></div></div>'
    +'<div class="card"><div class="card-title">'+t('chMonthly')+'</div>'
    +'<div class="tw"><table><thead><tr><th>'+t('ch')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead><tbody>'
    +allChRows
    +'<tr class="tr ct"><td>'+t('total')+'</td>'+mList.map(m=>'<td>'+fw(chGrandByM(m))+'</td>').join('')+'<td>'+fw(grand)+'</td></tr>'
    +'</tbody></table></div></div></div>';

  const indivChPanes = sCh.map((ch,i)=>{
    const mv=mList.map(m=>CATS.reduce((s,cat)=>s+getCV(ch,cat,m),0));
    const chTot=mv.reduce((a,b)=>a+b,0);
    const catTots2=CATS.map(cat=>mList.reduce((s,m)=>s+getCV(ch,cat,m),0));
    const catRows2=CATS.map((cat,ci)=>'<tr><td><span class="badge '+BADGE_CLS[cat]+'">'+cn(cat)+'</span></td>'
      +mList.map(m=>'<td>'+fw(getCV(ch,cat,m))+'</td>').join('')+'<td><strong>'+fw(catTots2[ci])+'</strong></td></tr>').join('');
    return '<div id="sub-'+i+'-'+sfx+'" class="sub-pane">'
      +'<div class="card"><div class="card-title">'+ch+' — '+t('trend')+'（'+t('wan')+'）</div>'
      +'<div class="chart-wrap"><canvas id="chart-ch-'+i+'-'+sfx+'"></canvas></div></div>'
      +'<div class="card"><div class="card-title">'+ch+' — '+t('cat')+'×'+t('trend')+'</div>'
      +'<div class="tw"><table><thead><tr><th>'+t('cat')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead><tbody>'
      +catRows2
      +'<tr class="tr ct"><td>'+t('total')+'</td>'+mv.map(v=>'<td>'+fw(v)+'</td>').join('')+'<td>'+fw(chTot)+'</td></tr>'
      +'</tbody></table></div></div></div>';
  }).join('');

  const chPane = '<div id="pane-ch-'+sfx+'" class="main-tab-pane">'
    +'<div class="ch-layout">'
    +'<div class="ch-side"><div class="ch-side-title">'+t('chList')+'</div>'+sideMenuBtns+'</div>'
    +'<div class="ch-content">'+allChPane+indivChPanes+'</div>'
    +'</div></div>';

  return '<div class="main-tabs">'
    +'<button class="main-tab-btn tt active" onclick="switchMain(this,\'pane-total-'+sfx+'\')">'+t('total')+'</button>'
    +CATS.map(cat=>'<button class="main-tab-btn '+CAT_CLASS[cat]+'" onclick="switchMain(this,\'pane-'+cat+'-'+sfx+'\')">'+cn(cat)+'</button>').join('')
    +'<button class="main-tab-btn tc" onclick="switchMain(this,\'pane-ch-'+sfx+'\')">'+t('tabCh')+'</button>'
    +'</div>'
    // 合計パネル
    +'<div id="pane-total-'+sfx+'" class="main-tab-pane active">'
    +'<div class="cd-grid">'
    +'<div class="card"><div class="card-title">'+t('trend')+'（'+t('wan')+'）</div><div class="chart-wrap"><canvas id="chart-trend-'+sfx+'"></canvas></div></div>'
    +'<div class="card"><div class="card-title">'+t('donut')+'</div><div class="chart-wrap"><canvas id="chart-donut-'+sfx+'"></canvas></div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">'+t('tbl')+'</div><div class="tw"><table>'
    +'<thead><tr><th>'+t('cat')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead>'
    +'<tbody>'+catRows+totRow+'</tbody>'
    +'</table></div></div>'
    +'</div>'
    +catPanes+chPane;
}

// ---- チャート描画 ----
function drawCharts(mList, sfx, byCat, chData, sortedCh) {
  const unit = lang==='zh'?' 萬':' 万';
  const getV = (cat,m) => byCat[cat]?(byCat[cat].months[m]||0):0;
  const getCV = (ch,cat,m) => chData[ch][cat][m]||0;
  const chTot = ch => mList.reduce((s,m)=>s+CATS.reduce((ss,cat)=>ss+getCV(ch,cat,m),0),0);
  const sCh = [...sortedCh].sort((a,b)=>chTot(b)-chTot(a));

  // 合計推移
  makeBar('chart-trend-'+sfx, mList, CATS.map(cat=>({
    label:cn(cat), data:mList.map(m=>parseFloat((getV(cat,m)/10000).toFixed(1))),
    backgroundColor:CAT_COLORS[cat]+'cc', borderRadius:3
  })), unit);

  // ドーナツ
  makeDonut('chart-donut-'+sfx, CATS.map(cn),
    CATS.map(cat=>parseFloat((mList.reduce((s,m)=>s+getV(cat,m),0)/10000).toFixed(1))),
    CATS.map(c=>CAT_COLORS[c]));

  // カテゴリ別
  CATS.forEach(cat=>{
    const bars=sCh.map((ch,i)=>({
      label:ch,
      data:mList.map(m=>parseFloat((getCV(ch,cat,m)/10000).toFixed(1))),
      backgroundColor:CH_COLORS[i%CH_COLORS.length]+'cc', borderRadius:3,
      _tot:mList.reduce((s,m)=>s+getCV(ch,cat,m),0)
    })).filter(b=>b._tot>0);
    makeBar('chart-cat-'+cat+'-'+sfx, mList, bars, unit);
  });

  // チャネル全体
  makeBar('chart-ch-all-'+sfx, mList, sCh.map((ch,i)=>({
    label:ch,
    data:mList.map(m=>parseFloat((CATS.reduce((s,cat)=>s+getCV(ch,cat,m),0)/10000).toFixed(1))),
    backgroundColor:CH_COLORS[i%CH_COLORS.length]+'cc', borderRadius:3
  })), unit);

  // 通路個別
  sCh.forEach((ch,i)=>{
    makeBar('chart-ch-'+i+'-'+sfx, mList, CATS.map(cat=>({
      label:cn(cat),
      data:mList.map(m=>parseFloat((getCV(ch,cat,m)/10000).toFixed(1))),
      backgroundColor:CAT_COLORS[cat]+'cc', borderRadius:3
    })), unit);
  });
}

// ---- メイン描画 ----
function renderApp(rows) {
  globalRows = rows;
  const byCat = aggByCat(rows);

  // チャネル集計
  const channels = [...new Set(rows.map(r=>r.channel))];
  const chData = {};
  channels.forEach(ch=>{ chData[ch]={}; CATS.forEach(cat=>{ chData[ch][cat]=Object.fromEntries(MONTHS.map(m=>[m,0])); }); });
  rows.forEach(r=>{ MONTHS.forEach(m=>{ chData[r.channel][r.category][m]+=r[m]||0; }); });
  const chTotalAll = ch => MONTHS.reduce((s,m)=>s+CATS.reduce((ss,cat)=>ss+chData[ch][cat][m],0),0);
  const sortedCh = [...channels].sort((a,b)=>chTotalAll(b)-chTotalAll(a));

  // 年度合計
  const totals = {}, grand = CATS.reduce((s,cat)=>{ totals[cat]=MONTHS.reduce((ss,m)=>ss+(byCat[cat]?byCat[cat].months[m]:0),0); return s+totals[cat]; },0);

  document.getElementById('h-title').textContent = t('title');
  document.getElementById('data-info').textContent = 'FY25 (4月〜3月)';

  // KPI HTML
  const kpiHTML = '<div class="kpi-grid">'
    +'<div class="kpi-card ct"><div class="kpi-label">'+t('total')+'</div>'
    +'<div class="kpi-value">'+fw(grand)+'<span class="kpi-unit">'+t('wan')+'</span></div>'
    +'<div class="kpi-sub">'+t('annual')+'</div></div>'
    +CATS.map(cat=>'<div class="kpi-card '+CAT_CLASS[cat]+'">'
      +'<div class="kpi-label">'+cn(cat)+'</div>'
      +'<div class="kpi-value">'+fw(totals[cat])+'<span class="kpi-unit">'+t('wan')+'</span></div>'
      +'<div class="kpi-sub">'+t('annual')+'</div></div>').join('')
    +'</div>';

  // Q/H集計版 byCat・chData を生成（粒度変換）
  function makeQAgg(periodList) {
    const qByCat = {};
    CATS.forEach(cat=>{
      qByCat[cat]={months:{}};
      periodList.forEach(p=>{
        qByCat[cat].months[p.key]=p.months.reduce((s,m)=>s+(byCat[cat]?byCat[cat].months[m]:0),0);
      });
    });
    const qChData = {};
    channels.forEach(ch=>{
      qChData[ch]={};
      CATS.forEach(cat=>{
        qChData[ch][cat]={};
        periodList.forEach(p=>{
          qChData[ch][cat][p.key]=p.months.reduce((s,m)=>s+(chData[ch][cat][m]||0),0);
        });
      });
    });
    return {qByCat, qChData, keys:periodList.map(p=>p.key)};
  }

  const qAgg = makeQAgg(QUARTERS);
  const hAgg = makeQAgg(HALVES);

  const swHTML = '<div class="period-sw">'
    +'<button class="period-btn active" onclick="switchPeriod(this,\'p-annual\')">'+t('periodY')+'</button>'
    +'<button class="period-btn" onclick="switchPeriod(this,\'p-quarterly\')">'+t('periodQ')+'</button>'
    +'<button class="period-btn" onclick="switchPeriod(this,\'p-half\')">'+t('periodH')+'</button>'
    +'</div>';

  const annualHTML = '<div id="p-annual" class="period-pane active">'+buildPaneHTML(MONTHS,'annual',byCat,chData,sortedCh)+'</div>';
  const quarterlyHTML = '<div id="p-quarterly" class="period-pane">'+buildPaneHTML(qAgg.keys,'quarterly',qAgg.qByCat,qAgg.qChData,sortedCh)+'</div>';
  const halfHTML = '<div id="p-half" class="period-pane">'+buildPaneHTML(hAgg.keys,'half',hAgg.qByCat,hAgg.qChData,sortedCh)+'</div>';

  document.getElementById('app').innerHTML = kpiHTML+swHTML+annualHTML+quarterlyHTML+halfHTML;

  drawCharts(MONTHS,'annual',byCat,chData,sortedCh);
  drawCharts(qAgg.keys,'quarterly',qAgg.qByCat,qAgg.qChData,sortedCh);
  drawCharts(hAgg.keys,'half',hAgg.qByCat,hAgg.qChData,sortedCh);

// ---- スイッチ関数 ----
function switchPeriod(btn,id){
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.period-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(id).classList.add('active');
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50);
}
function switchQ(btn,id){
  const par=btn.closest('.period-pane');
  par.querySelectorAll('.q-tab-btn').forEach(b=>b.classList.remove('active'));
  par.querySelectorAll('.q-tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(id).classList.add('active');
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50);
}
function switchMain(btn,id){
  const par=btn.closest('.q-tab-pane')||btn.closest('.period-pane');
  par.querySelectorAll(':scope > .main-tabs > .main-tab-btn').forEach(b=>b.classList.remove('active'));
  par.querySelectorAll(':scope > .main-tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(id).classList.add('active');
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50);
}
function switchChMenu(btn,id){
  const par=btn.closest('.main-tab-pane');
  par.querySelectorAll('.ch-menu-btn').forEach(b=>b.classList.remove('active'));
  par.querySelectorAll('.sub-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(id).classList.add('active');
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50);
}

fetch('data.csv?t='+Date.now())
  .then(r=>{if(!r.ok) throw new Error('CSV讀取失敗');return r.text();})
  .then(text=>renderApp(parseCSV(text)))
  .catch(err=>{document.getElementById('app').innerHTML='<div class="error">⚠️ '+err.message+'<br><small>data.csv を同じフォルダに置いてください</small></div>';});
</script>
