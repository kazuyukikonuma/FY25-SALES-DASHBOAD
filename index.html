<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FY25 銷售額儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#f4f6f9;--sur:#fff;--bor:#d8dde8;--borl:#edf0f5;
  --txt:#111827;--sub:#374151;
  --al:#2563eb;--ap:#059669;--am:#7c3aed;--at:#dc2626;
  --alb:#eff6ff;--apb:#ecfdf5;--amb:#f5f3ff;--atb:#fef2f2;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP','Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);padding:20px 24px;font-size:15px;}
/* Header */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--bor);}
.hl{display:flex;align-items:baseline;gap:12px;}
h1{font-size:1.3rem;font-weight:700;}
#dinfo{font-size:.8rem;color:var(--sub);font-family:'DM Mono',monospace;}
.ltog{display:flex;border:2px solid var(--bor);border-radius:8px;overflow:hidden;}
.lbtn{background:none;border:none;padding:6px 16px;font-size:.85rem;font-family:inherit;font-weight:500;cursor:pointer;color:var(--sub);}
.lbtn.on{background:var(--txt);color:#fff;}
/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kcard{background:var(--sur);border:2px solid var(--bor);border-radius:12px;padding:16px 18px;}
.kcard.kt{border-top:4px solid var(--at);}
.kcard.kl{border-top:4px solid var(--al);}
.kcard.kp{border-top:4px solid var(--ap);}
.kcard.km{border-top:4px solid var(--am);}
.klbl{font-size:.8rem;font-weight:600;color:var(--sub);margin-bottom:6px;}
.kval{font-size:1.7rem;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.03em;line-height:1;margin-bottom:3px;}
.kunit{font-size:.88rem;font-weight:500;margin-left:3px;opacity:.75;}
.kcard.kt .kval{color:var(--at);}
.kcard.kl .kval{color:var(--al);}
.kcard.kp .kval{color:var(--ap);}
.kcard.km .kval{color:var(--am);}
.ksub{font-size:.76rem;color:var(--sub);font-weight:500;}
/* Period switcher */
.psw{display:flex;gap:6px;margin-bottom:18px;}
.pbtn{background:var(--sur);border:2px solid var(--bor);border-radius:8px;padding:8px 22px;font-size:.9rem;font-family:inherit;font-weight:700;cursor:pointer;color:var(--sub);}
.pbtn.on{background:var(--txt);border-color:var(--txt);color:#fff;}
.ppane{display:none;}.ppane.on{display:block;}
/* Main tabs */
.mtabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:2px solid var(--bor);flex-wrap:wrap;}
.mbtn{background:none;border:none;padding:9px 18px;font-size:.86rem;font-family:inherit;font-weight:700;cursor:pointer;color:var(--sub);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.mbtn.on{color:var(--txt);}
.mbtn.on.tt{border-bottom-color:var(--at);}
.mbtn.on.tl{border-bottom-color:var(--al);}
.mbtn.on.tp{border-bottom-color:var(--ap);}
.mbtn.on.tm{border-bottom-color:var(--am);}
.mbtn.on.tc{border-bottom-color:#374151;}
.mbtn.on.tx{border-bottom-color:#b45309;}
.mbtn.on.th{border-bottom-color:#0891b2;}
.mbtn:not(.on):hover{color:var(--txt);}
.mpane{display:none;}.mpane.on{display:block;}
/* Card */
.card{background:var(--sur);border:2px solid var(--bor);border-radius:12px;padding:18px 20px;margin-bottom:12px;}
.ctit{font-size:.86rem;font-weight:700;color:var(--txt);margin-bottom:14px;}
.cw{position:relative;height:270px;}
.cdg{display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:12px;}
/* Channel side menu */
.chlay{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:start;}
.chside{background:var(--sur);border:2px solid var(--bor);border-radius:12px;overflow:hidden;position:sticky;top:12px;}
.chsit{font-size:.7rem;font-weight:700;color:var(--sub);letter-spacing:.08em;padding:10px 12px 7px;border-bottom:1px solid var(--borl);text-transform:uppercase;}
.chmb{display:block;width:100%;background:none;border:none;border-bottom:1px solid var(--borl);padding:9px 12px;text-align:left;font-size:.83rem;font-family:inherit;font-weight:500;color:var(--sub);cursor:pointer;}
.chmb:last-child{border-bottom:none;}
.chmb:not(.on):hover{background:var(--bg);color:var(--txt);}
.chmb.on{background:var(--txt);color:#fff;font-weight:700;}
.chcon{min-width:0;}
.spane{display:none;}.spane.on{display:block;}
/* Table */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
th{text-align:right;color:var(--txt);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--bor);font-family:'DM Mono',monospace;font-size:.76rem;white-space:nowrap;background:var(--bg);}
th:first-child{text-align:left;}
td{text-align:right;padding:7px 10px;border-bottom:1px solid var(--borl);font-family:'DM Mono',monospace;font-size:.83rem;color:var(--txt);white-space:nowrap;}
td:first-child{text-align:left;font-family:'Noto Sans JP','Noto Sans TC',sans-serif;font-size:.86rem;font-weight:500;}
tr:last-child td{border-bottom:none;}
tr:hover:not(.tr) td{background:var(--bg);}
.tr td{font-weight:700;border-top:2px solid var(--bor);border-bottom:none;}
.tr.ct td{color:var(--at);background:var(--atb);}
.tr.cl td{color:var(--al);background:var(--alb);}
.tr.cp td{color:var(--ap);background:var(--apb);}
.tr.cm td{color:var(--am);background:var(--amb);}
.bdg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.76rem;font-weight:600;}
.bl{background:var(--alb);color:var(--al);}
.bp{background:var(--apb);color:var(--ap);}
.bm{background:var(--amb);color:var(--am);}
/* Heatmap */
.hm table{width:100%;border-collapse:collapse;font-size:.82rem;}
.hm th{text-align:center;padding:8px 10px;border:1px solid var(--bor);background:var(--bg);font-weight:700;font-size:.76rem;white-space:nowrap;}
.hm th:first-child{text-align:left;}
.hm td{text-align:right;padding:8px 10px;border:1px solid var(--bor);font-family:'DM Mono',monospace;font-size:.82rem;white-space:nowrap;font-weight:500;}
.hm td:first-child{text-align:left;font-family:'Noto Sans JP','Noto Sans TC',sans-serif;font-weight:600;}
.hm .trt td{font-weight:700;background:var(--bg)!important;border-top:2px solid var(--bor);}
/* Cross filter */
.cfrow{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.csel{padding:6px 10px;border:1.5px solid var(--bor);border-radius:6px;font-family:inherit;font-size:.85rem;color:var(--txt);background:var(--sur);cursor:pointer;}
.cadd{padding:6px 14px;background:var(--txt);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:.83rem;font-weight:600;cursor:pointer;}
.cadd:hover{opacity:.85;}
.cclr{padding:6px 14px;background:none;color:var(--sub);border:1.5px solid var(--bor);border-radius:6px;font-family:inherit;font-size:.83rem;font-weight:600;cursor:pointer;}
.ctags{display:flex;flex-wrap:wrap;gap:6px;min-height:20px;margin-bottom:10px;}
.ctag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:600;}
.ctag button{background:none;border:none;cursor:pointer;font-size:.9rem;line-height:1;opacity:.7;}
.ctag button:hover{opacity:1;}
/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--sub);gap:10px;}
.spin{width:22px;height:22px;border:3px solid var(--bor);border-top-color:var(--at);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.err{color:var(--at);text-align:center;padding:40px;}
@media(max-width:900px){.kgrid{grid-template-columns:repeat(2,1fr);}.cdg{grid-template-columns:1fr;}.chlay{grid-template-columns:1fr;}body{padding:12px;}}
</style>
</head>
<body>
<header>
  <div class="hl">
    <h1 id="htit">FY25 銷售額儀表板</h1>
    <span id="dinfo">載入中…</span>
  </div>
  <div class="ltog">
    <button class="lbtn" onclick="setLang('ja')">日本語</button>
    <button class="lbtn on" onclick="setLang('zh')">繁體中文</button>
  </div>
</header>
<div id="app"><div class="loading"><div class="spin"></div><span>載入資料中…</span></div></div>

<script>
// ===== 定数 =====
var MONTHS = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
var CATS = ['學習','周邊','Mirafeel'];
var CCOLORS = {'學習':'#2563eb','周邊':'#059669','Mirafeel':'#7c3aed'};
var CCLS = {'學習':'kl','周邊':'kp','Mirafeel':'km'};
var BDGCLS = {'學習':'bl','周邊':'bp','Mirafeel':'bm'};
var TRCLS = {'學習':'cl','周邊':'cp','Mirafeel':'cm'};
var CHCOL = ['#2563eb','#059669','#7c3aed','#dc2626','#d97706','#0891b2','#be185d'];
var XCOL = ['#b45309','#0891b2','#be185d','#065f46','#1e40af','#7c2d12','#4c1d95'];
var QUARTERS = [
  {key:'Q1',months:['4月','5月','6月']},
  {key:'Q2',months:['7月','8月','9月']},
  {key:'Q3',months:['10月','11月','12月']},
  {key:'Q4',months:['1月','2月','3月']}
];
var HALVES = [
  {key:'H1',months:['4月','5月','6月','7月','8月','9月']},
  {key:'H2',months:['10月','11月','12月','1月','2月','3月']}
];
var I18N = {
  ja:{
    title:'FY25 売上額ダッシュボード',annual:'年間合計（税抜）',
    total:'合計',wan:'万元',cat:'カテゴリ',ch:'チャネル',
    trend:'月次推移',donut:'カテゴリ構成比',tbl:'月別明細',
    chmon:'チャネル×月次',tabch:'チャネル別',chlist:'通路一覧',
    pY:'年度',pQ:'四半期別',pH:'上/下半期',
    cross:'クロス分析',crosschart:'絞り込み時系列',
    crossadd:'系列追加',crossclr:'全消去',crossall:'全て',
    heat:'ヒートマップ',heatttl:'ヒートマップ（通路×商品群）',
    H1:'上半期',H2:'下半期',
    names:{'學習':'学習','周邊':'周邊','Mirafeel':'Mirafeel'}
  },
  zh:{
    title:'FY25 銷售額儀表板',annual:'年度合計（未稅）',
    total:'合計',wan:'萬元',cat:'品類',ch:'通路',
    trend:'月次趨勢',donut:'品類構成比',tbl:'月別明細',
    chmon:'通路×月次',tabch:'通路別',chlist:'通路列表',
    pY:'年度',pQ:'季別',pH:'上/下半年',
    cross:'交叉分析',crosschart:'篩選時序圖',
    crossadd:'新增系列',crossclr:'清除',crossall:'全部',
    heat:'熱力圖',heatttl:'熱力圖（通路×商品群）',
    H1:'上半年',H2:'下半年',
    names:{'學習':'學習','周邊':'周邊','Mirafeel':'Mirafeel'}
  }
};

// ===== State =====
var lang = 'zh';
var charts = {};
var globalRows = null;
var crossSeries = {}; // sfx -> [{cat,ch,label,color}]

function t(k){ return I18N[lang][k]; }
function cn(c){ return I18N[lang].names[c]||c; }
function fw(n){ return (n/10000).toFixed(1); }

// ===== Lang =====
function setLang(l){
  lang = l;
  document.querySelectorAll('.lbtn').forEach(function(b){
    b.classList.toggle('on', b.textContent.includes(l==='ja'?'日本語':'繁體'));
  });
  if(globalRows) renderApp(globalRows);
}

// ===== Parse CSV =====
function parseCSV(text){
  var lines = text.trim().split('\n');
  var hdr = lines[0].split(',');
  return lines.slice(1).map(function(line){
    var v = line.split(','), o = {};
    hdr.forEach(function(h,i){
      var s = (v[i]||'').trim();
      o[h.trim()] = (s!==''&&!isNaN(s)) ? Number(s) : s;
    });
    return o;
  });
}

// ===== Aggregate =====
function aggByCat(rows){
  var r = {};
  rows.forEach(function(row){
    var c = row.category;
    if(!r[c]) r[c] = {months:{}};
    MONTHS.forEach(function(m){ r[c].months[m] = (r[c].months[m]||0) + (row[m]||0); });
  });
  return r;
}

function aggChData(rows){
  var chs = [];
  rows.forEach(function(r){ if(chs.indexOf(r.channel)<0) chs.push(r.channel); });
  var d = {};
  chs.forEach(function(ch){
    d[ch] = {};
    CATS.forEach(function(cat){
      d[ch][cat] = {};
      MONTHS.forEach(function(m){ d[ch][cat][m] = 0; });
    });
  });
  rows.forEach(function(r){
    MONTHS.forEach(function(m){ d[r.channel][r.category][m] += (r[m]||0); });
  });
  return {chs:chs, d:d};
}

function makeQAgg(periodList, byCat, chd, chs){
  var qb = {};
  CATS.forEach(function(cat){
    qb[cat] = {months:{}};
    periodList.forEach(function(p){
      qb[cat].months[p.key] = p.months.reduce(function(s,m){ return s+(byCat[cat]?byCat[cat].months[m]||0:0); },0);
    });
  });
  var qc = {};
  chs.forEach(function(ch){
    qc[ch] = {};
    CATS.forEach(function(cat){
      qc[ch][cat] = {};
      periodList.forEach(function(p){
        qc[ch][cat][p.key] = p.months.reduce(function(s,m){ return s+(chd[ch]&&chd[ch][cat]?chd[ch][cat][m]||0:0); },0);
      });
    });
  });
  return {byCat:qb, chd:qc, keys:periodList.map(function(p){ return p.key; })};
}

// ===== Chart helpers =====
function gc(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
var GC = '#edf0f5';
var TS = {color:'#111827',font:{size:12,weight:'600'}};

function mkBar(id, labels, datasets, unit){
  gc(id);
  var el = document.getElementById(id); if(!el) return;
  charts[id] = new Chart(el, {
    type:'bar',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#111827',font:{size:12,weight:'600'}}}},
      scales:{
        x:{stacked:true,ticks:TS,grid:{color:GC}},
        y:{stacked:true,ticks:{color:'#111827',font:{size:12,weight:'600'},callback:function(v){return v+unit;}},grid:{color:GC}}
      }
    }
  });
}

function mkDonut(id, labels, data, colors){
  gc(id);
  var el = document.getElementById(id); if(!el) return;
  var total = data.reduce(function(a,b){return a+b;},0);
  charts[id] = new Chart(el, {
    type:'doughnut',
    data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'58%',
      plugins:{
        legend:{position:'bottom',labels:{color:'#111827',font:{size:12,weight:'600'},padding:12}},
        tooltip:{callbacks:{label:function(ctx){
          return ' '+ctx.label+': '+fw(ctx.parsed*10000)+' ('+(ctx.parsed/total*100).toFixed(1)+'%)';
        }}}
      },
      animation:{onComplete:function(){ drawPct(this); }}
    }
  });
}

function drawPct(chart){
  var ctx = chart.ctx, meta = chart.getDatasetMeta(0);
  var total = chart.data.datasets[0].data.reduce(function(a,b){return a+b;},0);
  ctx.save();
  ctx.font = '700 11px DM Mono,monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  meta.data.forEach(function(arc,i){
    var pct = (chart.data.datasets[0].data[i]/total*100).toFixed(1)+'%';
    var angle = (arc.startAngle+arc.endAngle)/2;
    var r = (arc.innerRadius+arc.outerRadius)/2;
    ctx.fillStyle = '#fff';
    ctx.fillText(pct, arc.x+Math.cos(angle)*r, arc.y+Math.sin(angle)*r);
  });
  ctx.restore();
}

function mkLine(id, labels, datasets, unit){
  gc(id);
  var el = document.getElementById(id); if(!el) return;
  charts[id] = new Chart(el, {
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#111827',font:{size:12,weight:'600'}}}},
      scales:{
        x:{ticks:TS,grid:{color:GC}},
        y:{ticks:{color:'#111827',font:{size:12,weight:'600'},callback:function(v){return v+unit;}},grid:{color:GC}}
      }
    }
  });
}

// ===== HTML builder =====
function buildPane(mList, sfx, byCat, chd, chs, sortedCh){
  var unit = lang==='zh'?' 萬':' 万';
  function gv(cat,m){ return byCat[cat]?byCat[cat].months[m]||0:0; }
  function gcv(ch,cat,m){ return (chd[ch]&&chd[ch][cat])?chd[ch][cat][m]||0:0; }

  // カテゴリ合計
  var catTots = {}, grand = 0;
  CATS.forEach(function(cat){
    catTots[cat] = mList.reduce(function(s,m){ return s+gv(cat,m); },0);
    grand += catTots[cat];
  });
  var mTots = {};
  mList.forEach(function(m){ mTots[m] = CATS.reduce(function(s,cat){ return s+gv(cat,m); },0); });

  // チャネルソート
  var sCh = sortedCh.slice().sort(function(a,b){
    var ta = mList.reduce(function(s,m){ return s+CATS.reduce(function(ss,cat){ return ss+gcv(a,cat,m); },0); },0);
    var tb = mList.reduce(function(s,m){ return s+CATS.reduce(function(ss,cat){ return ss+gcv(b,cat,m); },0); },0);
    return tb-ta;
  });

  var mThs = mList.map(function(m){ return '<th>'+m+'</th>'; }).join('');

  // ---- 合計パネル ----
  var catRows = CATS.map(function(cat){
    if(!byCat[cat]) return '';
    return '<tr><td><span class="bdg '+BDGCLS[cat]+'">'+cn(cat)+'</span></td>'
      +mList.map(function(m){ return '<td>'+fw(gv(cat,m))+'</td>'; }).join('')
      +'<td><strong>'+fw(catTots[cat])+'</strong></td></tr>';
  }).join('');
  var totRow = '<tr class="tr ct"><td>'+t('total')+'</td>'
    +mList.map(function(m){ return '<td>'+fw(mTots[m])+'</td>'; }).join('')
    +'<td>'+fw(grand)+'</td></tr>';

  var totalPane = '<div id="pt-'+sfx+'" class="mpane on">'
    +'<div class="cdg">'
    +'<div class="card"><div class="ctit">'+t('trend')+'（'+t('wan')+'）</div><div class="cw"><canvas id="c-trend-'+sfx+'"></canvas></div></div>'
    +'<div class="card"><div class="ctit">'+t('donut')+'</div><div class="cw"><canvas id="c-donut-'+sfx+'"></canvas></div></div>'
    +'</div>'
    +'<div class="card"><div class="ctit">'+t('tbl')+'</div><div class="tw"><table>'
    +'<thead><tr><th>'+t('cat')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead>'
    +'<tbody>'+catRows+totRow+'</tbody>'
    +'</table></div></div>'
    +'</div>';

  // ---- カテゴリ別パネル ----
  var catPanes = CATS.map(function(cat){
    if(!byCat[cat]) return '';
    var chR = sCh.map(function(ch){
      var vals = mList.map(function(m){ return gcv(ch,cat,m); });
      var tot = vals.reduce(function(a,b){ return a+b; },0);
      if(!tot) return '';
      return '<tr><td>'+ch+'</td>'+vals.map(function(v){ return '<td>'+fw(v)+'</td>'; }).join('')+'<td><strong>'+fw(tot)+'</strong></td></tr>';
    }).join('');
    var colTots = mList.map(function(m){ return sCh.reduce(function(s,ch){ return s+gcv(ch,cat,m); },0); });
    var catTot = colTots.reduce(function(a,b){ return a+b; },0);
    return '<div id="p'+cat+'-'+sfx+'" class="mpane">'
      +'<div class="card"><div class="ctit">'+cn(cat)+' — '+t('trend')+'（'+t('wan')+'）</div><div class="cw"><canvas id="c-cat-'+cat+'-'+sfx+'"></canvas></div></div>'
      +'<div class="card"><div class="ctit">'+cn(cat)+' — '+t('ch')+'×'+t('trend')+'</div><div class="tw"><table>'
      +'<thead><tr><th>'+t('ch')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead><tbody>'
      +chR
      +'<tr class="tr '+TRCLS[cat]+'"><td>'+t('total')+'</td>'+colTots.map(function(v){ return '<td>'+fw(v)+'</td>'; }).join('')+'<td>'+fw(catTot)+'</td></tr>'
      +'</tbody></table></div></div>'
      +'</div>';
  }).join('');

  // ---- チャネル別パネル（サイドメニュー） ----
  var menuBtns = '<button class="chmb on" onclick="swCh(this,\'sc-all-'+sfx+'\')">'+t('total')+'</button>'
    +sCh.map(function(ch,i){
      return '<button class="chmb" onclick="swCh(this,\'sc-'+i+'-'+sfx+'\')">'+ch+'</button>';
    }).join('');

  var allChRows = sCh.map(function(ch){
    var mv = mList.map(function(m){ return CATS.reduce(function(s,cat){ return s+gcv(ch,cat,m); },0); });
    var tot = mv.reduce(function(a,b){ return a+b; },0);
    return '<tr><td>'+ch+'</td>'+mv.map(function(v){ return '<td>'+fw(v)+'</td>'; }).join('')+'<td><strong>'+fw(tot)+'</strong></td></tr>';
  }).join('');
  var grandByM = mList.map(function(m){ return sCh.reduce(function(s,ch){ return s+CATS.reduce(function(ss,cat){ return ss+gcv(ch,cat,m); },0); },0); });

  var allChPane = '<div id="sc-all-'+sfx+'" class="spane on">'
    +'<div class="card"><div class="ctit">'+t('tabch')+' — '+t('trend')+'（'+t('wan')+'）</div><div class="cw"><canvas id="c-chall-'+sfx+'"></canvas></div></div>'
    +'<div class="card"><div class="ctit">'+t('chmon')+'</div><div class="tw"><table>'
    +'<thead><tr><th>'+t('ch')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead><tbody>'
    +allChRows
    +'<tr class="tr ct"><td>'+t('total')+'</td>'+grandByM.map(function(v){ return '<td>'+fw(v)+'</td>'; }).join('')+'<td>'+fw(grand)+'</td></tr>'
    +'</tbody></table></div></div>'
    +'</div>';

  var indivPanes = sCh.map(function(ch,i){
    var mv = mList.map(function(m){ return CATS.reduce(function(s,cat){ return s+gcv(ch,cat,m); },0); });
    var chTot = mv.reduce(function(a,b){ return a+b; },0);
    var catTots2 = CATS.map(function(cat){ return mList.reduce(function(s,m){ return s+gcv(ch,cat,m); },0); });
    var catR2 = CATS.map(function(cat,ci){
      return '<tr><td><span class="bdg '+BDGCLS[cat]+'">'+cn(cat)+'</span></td>'
        +mList.map(function(m){ return '<td>'+fw(gcv(ch,cat,m))+'</td>'; }).join('')
        +'<td><strong>'+fw(catTots2[ci])+'</strong></td></tr>';
    }).join('');
    return '<div id="sc-'+i+'-'+sfx+'" class="spane">'
      +'<div class="card"><div class="ctit">'+ch+' — '+t('trend')+'（'+t('wan')+'）</div><div class="cw"><canvas id="c-ch-'+i+'-'+sfx+'"></canvas></div></div>'
      +'<div class="card"><div class="ctit">'+ch+' — '+t('cat')+'×'+t('trend')+'</div><div class="tw"><table>'
      +'<thead><tr><th>'+t('cat')+'</th>'+mThs+'<th>'+t('total')+'</th></tr></thead><tbody>'
      +catR2
      +'<tr class="tr ct"><td>'+t('total')+'</td>'+mv.map(function(v){ return '<td>'+fw(v)+'</td>'; }).join('')+'<td>'+fw(chTot)+'</td></tr>'
      +'</tbody></table></div></div>'
      +'</div>';
  }).join('');

  var chPane = '<div id="pch-'+sfx+'" class="mpane">'
    +'<div class="chlay">'
    +'<div class="chside"><div class="chsit">'+t('chlist')+'</div>'+menuBtns+'</div>'
    +'<div class="chcon">'+allChPane+indivPanes+'</div>'
    +'</div></div>';

  // ---- クロス分析パネル ----
  var catOpts = '<option value="">— '+t('crossall')+' —</option>'
    +CATS.map(function(cat){ return '<option value="'+cat+'">'+cn(cat)+'</option>'; }).join('');
  var chOpts = '<option value="">— '+t('crossall')+' —</option>'
    +sCh.map(function(ch){ return '<option value="'+ch+'">'+ch+'</option>'; }).join('');

  var crossPane = '<div id="px-'+sfx+'" class="mpane" data-sfx="'+sfx+'">'
    +'<div class="card">'
    +'<div class="cfrow">'
    +'<label>'+t('cat')+': <select class="csel ccat" onchange="">'+catOpts+'</select></label>'
    +'<label style="margin-left:12px">'+t('ch')+': <select class="csel cch" onchange="">'+chOpts+'</select></label>'
    +'<button class="cadd" onclick="addSeries(this)">＋ '+t('crossadd')+'</button>'
    +'<button class="cclr" onclick="clrSeries(this)">✕ '+t('crossclr')+'</button>'
    +'</div>'
    +'<div class="ctags"></div>'
    +'<div class="ctit">'+t('crosschart')+'</div>'
    +'<div class="cw"><canvas id="c-cross-'+sfx+'"></canvas></div>'
    +'</div></div>';

  // ---- ヒートマップパネル ----
  var maxV = 0;
  sCh.forEach(function(ch){
    CATS.forEach(function(cat){
      var v = mList.reduce(function(s,m){ return s+gcv(ch,cat,m); },0);
      if(v>maxV) maxV=v;
    });
  });
  function hbg(v){
    if(!v||!maxV) return '#f8f9fb';
    var r = v/maxV;
    return r>0.7?'#1d4ed8':r>0.4?'#3b82f6':r>0.2?'#93c5fd':r>0.05?'#dbeafe':'#f0f4ff';
  }
  function hfg(v){ return (v/maxV)>0.4?'#fff':'var(--txt)'; }

  var hmRows = sCh.map(function(ch){
    var cv = CATS.map(function(cat){ return mList.reduce(function(s,m){ return s+gcv(ch,cat,m); },0); });
    var ct = cv.reduce(function(a,b){ return a+b; },0);
    return '<tr><td>'+ch+'</td>'
      +cv.map(function(v){ return '<td style="background:'+hbg(v)+';color:'+hfg(v)+'">'+fw(v)+'</td>'; }).join('')
      +'<td><strong>'+fw(ct)+'</strong></td></tr>';
  }).join('');
  var hmTotRow = '<tr class="trt"><td>'+t('total')+'</td>'
    +CATS.map(function(cat){ return '<td>'+fw(catTots[cat])+'</td>'; }).join('')
    +'<td>'+fw(grand)+'</td></tr>';

  var heatPane = '<div id="ph-'+sfx+'" class="mpane">'
    +'<div class="card"><div class="ctit">'+t('heatttl')+'</div>'
    +'<div class="hm tw"><table>'
    +'<thead><tr><th>'+t('ch')+'</th>'+CATS.map(function(cat){ return '<th>'+cn(cat)+'</th>'; }).join('')+'<th>'+t('total')+'</th></tr></thead>'
    +'<tbody>'+hmRows+hmTotRow+'</tbody>'
    +'</table></div></div></div>';

  // ---- タブボタン + 全パネル結合 ----
  var tabs = '<div class="mtabs">'
    +'<button class="mbtn tt on" onclick="swM(this,\'pt-'+sfx+'\')">'+t('total')+'</button>'
    +CATS.map(function(cat){
      return '<button class="mbtn '+CCLS[cat].replace('k','t')+'" onclick="swM(this,\'p'+cat+'-'+sfx+'\')">'+cn(cat)+'</button>';
    }).join('')
    +'<button class="mbtn tc" onclick="swM(this,\'pch-'+sfx+'\')">'+t('tabch')+'</button>'
    +'<button class="mbtn tx" onclick="swM(this,\'px-'+sfx+'\')">'+t('cross')+'</button>'
    +'<button class="mbtn th" onclick="swM(this,\'ph-'+sfx+'\')">'+t('heat')+'</button>'
    +'</div>';

  return tabs+totalPane+catPanes+chPane+crossPane+heatPane;
}

// ===== Draw charts =====
function drawCharts(mList, sfx, byCat, chd, sortedCh){
  var unit = lang==='zh'?' 萬':' 万';
  function gv(cat,m){ return byCat[cat]?byCat[cat].months[m]||0:0; }
  function gcv(ch,cat,m){ return (chd[ch]&&chd[ch][cat])?chd[ch][cat][m]||0:0; }
  var sCh = sortedCh.slice().sort(function(a,b){
    var ta=mList.reduce(function(s,m){return s+CATS.reduce(function(ss,cat){return ss+gcv(a,cat,m);},0);},0);
    var tb=mList.reduce(function(s,m){return s+CATS.reduce(function(ss,cat){return ss+gcv(b,cat,m);},0);},0);
    return tb-ta;
  });

  // 合計推移
  mkBar('c-trend-'+sfx, mList, CATS.map(function(cat){
    return {label:cn(cat), data:mList.map(function(m){ return parseFloat((gv(cat,m)/10000).toFixed(1)); }),
      backgroundColor:CCOLORS[cat]+'cc', borderRadius:3};
  }), unit);

  // ドーナツ
  mkDonut('c-donut-'+sfx, CATS.map(cn),
    CATS.map(function(cat){ return parseFloat((mList.reduce(function(s,m){return s+gv(cat,m);},0)/10000).toFixed(1)); }),
    CATS.map(function(c){ return CCOLORS[c]; }));

  // カテゴリ別
  CATS.forEach(function(cat){
    var bars = sCh.map(function(ch,i){
      var tot = mList.reduce(function(s,m){return s+gcv(ch,cat,m);},0);
      return {label:ch, data:mList.map(function(m){return parseFloat((gcv(ch,cat,m)/10000).toFixed(1));}),
        backgroundColor:CHCOL[i%CHCOL.length]+'cc', borderRadius:3, _tot:tot};
    }).filter(function(b){return b._tot>0;});
    mkBar('c-cat-'+cat+'-'+sfx, mList, bars, unit);
  });

  // チャネル全体
  mkBar('c-chall-'+sfx, mList, sCh.map(function(ch,i){
    return {label:ch, data:mList.map(function(m){return parseFloat((CATS.reduce(function(s,cat){return s+gcv(ch,cat,m);},0)/10000).toFixed(1));}),
      backgroundColor:CHCOL[i%CHCOL.length]+'cc', borderRadius:3};
  }), unit);

  // 通路個別
  sCh.forEach(function(ch,i){
    mkBar('c-ch-'+i+'-'+sfx, mList, CATS.map(function(cat){
      return {label:cn(cat), data:mList.map(function(m){return parseFloat((gcv(ch,cat,m)/10000).toFixed(1));}),
        backgroundColor:CCOLORS[cat]+'cc', borderRadius:3};
    }), unit);
  });
}

// ===== クロス分析 =====
function getCrossPeriod(sfx){
  var pp = document.getElementById('px-'+sfx);
  if(!pp) return {mList:MONTHS, type:'annual'};
  var pane = pp.closest('.ppane');
  if(!pane) return {mList:MONTHS, type:'annual'};
  var pid = pane.id;
  if(pid==='pp-q') return {mList:['Q1','Q2','Q3','Q4'], type:'quarterly'};
  if(pid==='pp-h') return {mList:['H1','H2'], type:'half'};
  return {mList:MONTHS, type:'annual'};
}

function getSeriesVals(cat, ch, mList, type){
  if(!globalRows) return mList.map(function(){return 0;});
  var rows = globalRows.filter(function(r){
    return (cat?r.category===cat:true) && (ch?r.channel===ch:true);
  });
  if(type==='quarterly'){
    return QUARTERS.map(function(q){
      return parseFloat((rows.reduce(function(s,r){return s+q.months.reduce(function(ss,m){return ss+(r[m]||0);},0);},0)/10000).toFixed(1));
    });
  }
  if(type==='half'){
    return HALVES.map(function(h){
      return parseFloat((rows.reduce(function(s,r){return s+h.months.reduce(function(ss,m){return ss+(r[m]||0);},0);},0)/10000).toFixed(1));
    });
  }
  return MONTHS.map(function(m){
    return parseFloat((rows.reduce(function(s,r){return s+(r[m]||0);},0)/10000).toFixed(1));
  });
}

function renderCrossChart(sfx){
  gc('c-cross-'+sfx);
  var el = document.getElementById('c-cross-'+sfx); if(!el) return;
  var series = crossSeries[sfx]||[];
  var p = getCrossPeriod(sfx);
  var unit = lang==='zh'?' 萬':' 万';
  if(!series.length) return;
  mkLine('c-cross-'+sfx, p.mList, series.map(function(s){
    return {
      label:s.label,
      data:getSeriesVals(s.cat, s.ch, p.mList, p.type),
      borderColor:s.color, backgroundColor:s.color+'22',
      borderWidth:2.5, pointRadius:5, tension:0.3, fill:false
    };
  }), unit);
}

function addSeries(btn){
  var pane = btn.closest('.mpane');
  var sfx = pane.dataset.sfx;
  var cat = pane.querySelector('.ccat').value;
  var ch  = pane.querySelector('.cch').value;
  if(!crossSeries[sfx]) crossSeries[sfx]=[];
  var label = (cat?cn(cat):t('crossall'))+' × '+(ch||t('crossall'));
  if(crossSeries[sfx].find(function(s){return s.cat===cat&&s.ch===ch;})) return;
  var color = XCOL[crossSeries[sfx].length % XCOL.length];
  crossSeries[sfx].push({cat:cat, ch:ch, label:label, color:color});
  var tagBox = pane.querySelector('.ctags');
  var idx = crossSeries[sfx].length-1;
  var tag = document.createElement('span');
  tag.className = 'ctag';
  tag.style.background = color+'22';
  tag.style.color = color;
  tag.style.border = '1.5px solid '+color;
  tag.innerHTML = label+' <button onclick="rmSeries(this,\''+sfx+'\','+idx+')">✕</button>';
  tagBox.appendChild(tag);
  renderCrossChart(sfx);
}

function rmSeries(btn, sfx, idx){
  if(!crossSeries[sfx]) return;
  crossSeries[sfx].splice(idx,1);
  var pane = document.getElementById('px-'+sfx);
  var tagBox = pane.querySelector('.ctags');
  tagBox.innerHTML='';
  crossSeries[sfx].forEach(function(s,i){
    var tag=document.createElement('span');
    tag.className='ctag';
    tag.style.background=s.color+'22';
    tag.style.color=s.color;
    tag.style.border='1.5px solid '+s.color;
    tag.innerHTML=s.label+' <button onclick="rmSeries(this,\''+sfx+'\','+i+')">✕</button>';
    tagBox.appendChild(tag);
  });
  renderCrossChart(sfx);
}

function clrSeries(btn){
  var pane = btn.closest('.mpane');
  var sfx = pane.dataset.sfx;
  crossSeries[sfx]=[];
  pane.querySelector('.ctags').innerHTML='';
  renderCrossChart(sfx);
}

// ===== Switch functions =====
function swP(btn, id){
  document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.ppane').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById(id).classList.add('on');
  setTimeout(function(){ Object.values(charts).forEach(function(c){c.resize();}); },50);
}

function swM(btn, id){
  var scope = btn.closest('.ppane');
  scope.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on');});
  scope.querySelectorAll('.mpane').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById(id).classList.add('on');
  setTimeout(function(){ Object.values(charts).forEach(function(c){c.resize();}); },50);
}

function swCh(btn, id){
  var scope = btn.closest('.mpane');
  scope.querySelectorAll('.chmb').forEach(function(b){b.classList.remove('on');});
  scope.querySelectorAll('.spane').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById(id).classList.add('on');
  setTimeout(function(){ Object.values(charts).forEach(function(c){c.resize();}); },50);
}

// ===== Main render =====
function renderApp(rows){
  globalRows = rows;
  var byCat = aggByCat(rows);
  var ca = aggChData(rows);
  var chs = ca.chs, chd = ca.d;
  var chTotAll = function(ch){ return MONTHS.reduce(function(s,m){return s+CATS.reduce(function(ss,cat){return ss+(chd[ch]&&chd[ch][cat]?chd[ch][cat][m]||0:0);},0);},0); };
  var sortedCh = chs.slice().sort(function(a,b){ return chTotAll(b)-chTotAll(a); });

  var totals = {}, grand=0;
  CATS.forEach(function(cat){
    totals[cat]=MONTHS.reduce(function(s,m){return s+(byCat[cat]?byCat[cat].months[m]||0:0);},0);
    grand+=totals[cat];
  });

  document.getElementById('htit').textContent = t('title');
  document.getElementById('dinfo').textContent = 'FY25 (4月〜3月)';

  // KPI
  var kpi = '<div class="kgrid">'
    +'<div class="kcard kt"><div class="klbl">'+t('total')+'</div><div class="kval">'+fw(grand)+'<span class="kunit">'+t('wan')+'</span></div><div class="ksub">'+t('annual')+'</div></div>'
    +CATS.map(function(cat){
      return '<div class="kcard '+CCLS[cat]+'">'
        +'<div class="klbl">'+cn(cat)+'</div>'
        +'<div class="kval">'+fw(totals[cat])+'<span class="kunit">'+t('wan')+'</span></div>'
        +'<div class="ksub">'+t('annual')+'</div></div>';
    }).join('')
    +'</div>';

  // Period switcher
  var psw = '<div class="psw">'
    +'<button class="pbtn on" onclick="swP(this,\'pp-y\')">'+t('pY')+'</button>'
    +'<button class="pbtn" onclick="swP(this,\'pp-q\')">'+t('pQ')+'</button>'
    +'<button class="pbtn" onclick="swP(this,\'pp-h\')">'+t('pH')+'</button>'
    +'</div>';

  // Q/H集計
  var qAgg = makeQAgg(QUARTERS, byCat, chd, chs);
  var hAgg = makeQAgg(HALVES,   byCat, chd, chs);

  // Panes
  var pY = '<div id="pp-y" class="ppane on">'+buildPane(MONTHS,  'y',  byCat, chd, chs, sortedCh)+'</div>';
  var pQ = '<div id="pp-q" class="ppane">'+buildPane(qAgg.keys,'q', qAgg.byCat, qAgg.chd, chs, sortedCh)+'</div>';
  var pH = '<div id="pp-h" class="ppane">'+buildPane(hAgg.keys,'h', hAgg.byCat, hAgg.chd, chs, sortedCh)+'</div>';

  document.getElementById('app').innerHTML = kpi+psw+pY+pQ+pH;

  // Draw all charts
  drawCharts(MONTHS,   'y',  byCat, chd, sortedCh);
  drawCharts(qAgg.keys,'q', qAgg.byCat, qAgg.chd, sortedCh);
  drawCharts(hAgg.keys,'h', hAgg.byCat, hAgg.chd, sortedCh);
}

// ===== Boot =====
fetch('data.csv?t='+Date.now())
  .then(function(r){ if(!r.ok) throw new Error('CSV讀取失敗'); return r.text(); })
  .then(function(text){ renderApp(parseCSV(text)); })
  .catch(function(err){
    document.getElementById('app').innerHTML='<div class="err">⚠️ '+err.message+'<br><small>data.csv を同じフォルダに置いてください</small></div>';
  });
</script>
