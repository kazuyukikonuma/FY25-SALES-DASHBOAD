<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FY25 銷售額儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2336;
    --border: #2a3050;
    --text: #e8eaf0;
    --text-dim: #7a839e;
    --accent-m: #7c6af7;
    --accent-p: #2dd4bf;
    --accent-l: #f472b6;
    --accent-total: #fb923c;
    --green: #4ade80;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-card.mirafeel::before { background: var(--accent-m); }
  .kpi-card.henbien::before { background: var(--accent-p); }
  .kpi-card.gakushuu::before { background: var(--accent-l); }
  .kpi-card.total::before { background: var(--accent-total); }

  .kpi-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 1.8rem;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-card.mirafeel .kpi-value { color: var(--accent-m); }
  .kpi-card.henbien .kpi-value { color: var(--accent-p); }
  .kpi-card.gakushuu .kpi-value { color: var(--accent-l); }
  .kpi-card.total .kpi-value { color: var(--accent-total); }

  .kpi-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card-title {
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .chart-wrap {
    position: relative;
    height: 260px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    padding: 8px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent-total);
  }

  .tab-btn:hover { color: var(--text); }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  th {
    text-align: right;
    color: var(--text-dim);
    font-weight: 500;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
  }

  th:first-child { text-align: left; }

  td {
    text-align: right;
    padding: 6px 10px;
    border-bottom: 1px solid #1a1f30;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }

  td:first-child {
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  tr:last-child td { border-bottom: none; }

  .total-row td {
    color: var(--accent-total);
    font-weight: 600;
    border-top: 1px solid var(--border);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-dim);
    font-size: 0.9rem;
    gap: 10px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-total);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    color: var(--red);
    text-align: center;
    padding: 40px;
    font-size: 0.9rem;
  }

  @media (max-width: 768px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>FY25 銷售額儀表板</h1>
  <span id="data-info">讀取中…</span>
</header>

<div id="app">
  <div class="loading"><div class="spinner"></div>載入資料中…</div>
</div>

<script>
const MONTHS = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
const CATEGORY_COLORS = {
  'Mirafeel': '#7c6af7',
  '周邊': '#2dd4bf',
  '學習': '#f472b6',
  '合計': '#fb923c'
};

// CSV parse
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = isNaN(vals[i]) ? vals[i].trim() : Number(vals[i]);
    });
    return obj;
  });
}

// Aggregate by category
function aggregateByCategory(rows) {
  const result = {};
  rows.forEach(row => {
    const cat = row.category;
    if (!result[cat]) result[cat] = { category: cat, months: Object.fromEntries(MONTHS.map(m => [m, 0])) };
    MONTHS.forEach(m => { result[cat].months[m] += row[m] || 0; });
  });
  return result;
}

// Format number
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toLocaleString();
}

function fmtWan(n) {
  return (n / 10000).toFixed(1) + '万';
}

// Render
function renderApp(rows) {
  const byCategory = aggregateByCategory(rows);
  const cats = Object.values(byCategory);

  // Totals per category
  const totals = {};
  cats.forEach(c => {
    totals[c.category] = MONTHS.reduce((s, m) => s + c.months[m], 0);
  });
  const grandTotal = Object.values(totals).reduce((a,b) => a+b, 0);

  // Grand total per month
  const totalByMonth = {};
  MONTHS.forEach(m => {
    totalByMonth[m] = cats.reduce((s, c) => s + c.months[m], 0);
  });

  document.getElementById('data-info').textContent = `FY25 (4月〜3月)　全${rows.length}行`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- KPI Cards -->
    <div class="kpi-grid">
      ${['Mirafeel','周邊','學習'].map(cat => `
        <div class="kpi-card ${cat === 'Mirafeel' ? 'mirafeel' : cat === '周邊' ? 'henbien' : 'gakushuu'}">
          <div class="kpi-label">${cat}</div>
          <div class="kpi-value">${fmtWan(totals[cat] || 0)}</div>
          <div class="kpi-sub">年間合計（税抜）</div>
        </div>
      `).join('')}
      <div class="kpi-card total">
        <div class="kpi-label">合計</div>
        <div class="kpi-value">${fmtWan(grandTotal)}</div>
        <div class="kpi-sub">全カテゴリ合算</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">月別売上推移（万元）</div>
        <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">カテゴリ構成比</div>
        <div class="chart-wrap"><canvas id="chart-donut"></canvas></div>
      </div>
    </div>

    <!-- Detail Table with Tabs -->
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this,'tab-monthly')">月別明細</button>
        <button class="tab-btn" onclick="switchTab(this,'tab-channel')">チャネル別</button>
      </div>

      <div id="tab-monthly" class="tab-pane active">
        <table>
          <thead>
            <tr>
              <th>カテゴリ</th>
              ${MONTHS.map(m => `<th>${m}</th>`).join('')}
              <th>合計</th>
            </tr>
          </thead>
          <tbody>
            ${cats.map(c => `
              <tr>
                <td>${c.category}</td>
                ${MONTHS.map(m => `<td>${fmt(c.months[m])}</td>`).join('')}
                <td>${fmtWan(totals[c.category])}</td>
              </tr>
            `).join('')}
            <tr class="total-row">
              <td>合計</td>
              ${MONTHS.map(m => `<td>${fmt(totalByMonth[m])}</td>`).join('')}
              <td>${fmtWan(grandTotal)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="tab-channel" class="tab-pane">
        <table>
          <thead>
            <tr>
              <th>カテゴリ</th>
              <th>チャネル</th>
              ${MONTHS.map(m => `<th>${m}</th>`).join('')}
              <th>合計</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${r.category}</td>
                <td>${r.channel}</td>
                ${MONTHS.map(m => `<td>${fmt(r[m])}</td>`).join('')}
                <td>${fmtWan(MONTHS.reduce((s,m)=>s+r[m],0))}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  // Trend chart
  new Chart(document.getElementById('chart-trend'), {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: cats.map(c => ({
        label: c.category,
        data: MONTHS.map(m => Math.round(c.months[m] / 10000)),
        backgroundColor: CATEGORY_COLORS[c.category] + 'cc',
        borderRadius: 4,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#7a839e', font: { size: 11 } } } },
      scales: {
        x: { stacked: true, ticks: { color: '#7a839e', font: { size: 10 } }, grid: { color: '#1e2336' } },
        y: { stacked: true, ticks: { color: '#7a839e', font: { size: 10 }, callback: v => v + '万' }, grid: { color: '#1e2336' } }
      }
    }
  });

  // Donut chart
  new Chart(document.getElementById('chart-donut'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(totals),
      datasets: [{
        data: Object.keys(totals).map(k => Math.round(totals[k] / 10000)),
        backgroundColor: Object.keys(totals).map(k => CATEGORY_COLORS[k]),
        borderWidth: 0,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#7a839e', font: { size: 11 }, padding: 16 } }
      }
    }
  });
}

function switchTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// Load CSV with cache busting
fetch('data.csv?t=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('CSV読み込み失敗');
    return r.text();
  })
  .then(text => {
    const rows = parseCSV(text);
    renderApp(rows);
  })
  .catch(err => {
    document.getElementById('app').innerHTML = `<div class="error">⚠️ ${err.message}<br><small>data.csv が同じフォルダにあるか確認してください</small></div>`;
  });
</script>
</body>
</html>
